<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发送通知 — 流光镜影</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", "Microsoft YaHei", sans-serif; background: #0f0f1a; color: #e0e0f0; min-height: 100vh; }
    .top-bar { background: #1a1a2e; padding: 0.8em 1.5em; border-bottom: 1px solid #2a2a4a; display: flex; align-items: center; gap: 1em; position: sticky; top: 0; z-index: 100; }
    .top-bar a { color: #a78bfa; text-decoration: none; }
    .top-bar .site-name { color: #718096; font-size: 0.85em; }
    .container { max-width: 600px; margin: 0 auto; padding: 40px 24px; }
    h1 { color: #a78bfa; font-size: 1.5em; margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; color: #a0a0c0; font-size: 0.9em; margin-bottom: 6px; font-weight: 600; }
    .form-group input, .form-group textarea {
      width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid #3a3a5c;
      background: #1a1a2e; color: #e0e0f0; font-size: 0.95em; font-family: inherit;
    }
    .form-group textarea { min-height: 100px; resize: vertical; }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #805ad5; }
    .btn {
      padding: 12px 32px; border-radius: 10px; border: none; background: #805ad5; color: #fff;
      font-size: 1em; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.2s;
    }
    .btn:hover { background: #6b46c1; }
    .btn:disabled { background: #555; cursor: not-allowed; }
    .result { margin-top: 16px; padding: 16px; border-radius: 10px; font-size: 0.92em; display: none; }
    .result.success { display: block; background: #1a3a2a; border: 1px solid #2f5a3a; color: #9ae6b4; }
    .result.error { display: block; background: #3a1a1a; border: 1px solid #5a2f2f; color: #fc8181; }
    .info { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 10px; padding: 16px; margin-bottom: 20px; font-size: 0.88em; color: #718096; }
    .info strong { color: #a78bfa; }
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="/blog/">← 返回博客</a>
    <span class="site-name">流光镜影 · 发送通知</span>
  </div>
  <div class="container">
    <h1>📧 发送新文章通知</h1>

    <div class="info">
      <strong>💡 说明：</strong>填写文章信息后点击发送，所有订阅者将收到邮件通知。<br>
      需要先在 Worker 环境变量中配置 <code>RESEND_API_KEY</code>。
    </div>

    <div class="form-group">
      <label>文章标题 *</label>
      <input type="text" id="title" placeholder="例：真菌 MAG 注释流程 — funannotate" />
    </div>
    <div class="form-group">
      <label>文章链接 *</label>
      <input type="text" id="url" placeholder="例：https://my-blog.pages.dev/fungal_mag_funannotate.html" />
    </div>
    <div class="form-group">
      <label>文章描述（可选）</label>
      <textarea id="desc" placeholder="简短描述文章内容..."></textarea>
    </div>
    <button class="btn" id="send-btn" onclick="sendNotify()">📤 发送通知</button>
    <div class="result" id="result"></div>
  </div>

  <script>
    const WORKER_URL = "https://blog-visitor-tracker.liuzifeng1129662448.workers.dev";

    async function sendNotify() {
      const title = document.getElementById('title').value.trim();
      const url = document.getElementById('url').value.trim();
      const desc = document.getElementById('desc').value.trim();
      const result = document.getElementById('result');
      const btn = document.getElementById('send-btn');

      if (!title || !url) { result.className = 'result error'; result.textContent = '❌ 请填写文章标题和链接'; return; }

      const pw = prompt('输入管理密码：');
      if (!pw) return;

      btn.disabled = true;
      btn.textContent = '发送中...';

      try {
        const res = await fetch(WORKER_URL + "/notify", {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-Admin-Password": pw },
          body: JSON.stringify({ title, url, description: desc }),
        });
        const data = await res.json();
        if (data.ok) {
          result.className = 'result success';
          result.textContent = `✅ 发送成功！共发送 ${data.sent}/${data.total} 封邮件。`;
        } else {
          result.className = 'result error';
          result.textContent = `❌ ${data.error || '发送失败'}`;
        }
      } catch {
        result.className = 'result error';
        result.textContent = '❌ 网络错误，请稍后重试';
      }
      btn.disabled = false;
      btn.textContent = '📤 发送通知';
    }
  </script>
</body>
</html>
